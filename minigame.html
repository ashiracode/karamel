```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Paris → Lille Challenge</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#87ceeb,#dff6ff);
    text-align:center;
    padding:20px;
}

h1{
    color:#ff4f84;
    margin-bottom:10px;
}

#hud{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:12px 20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    font-weight:bold;
}

canvas{
    border:8px solid white;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

button{
    background:#ff4f84;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
    margin-bottom:15px;
}
</style>
</head>

<body>

<h1>🚗 Paris → Lille Challenge</h1>

<a href="index.html">
    <button>🏠 Retour à l'accueil</button>
</a>

<div id="hud">
    <div class="card">📍 Distance : <span id="distance">0</span> km</div>
    <div class="card">⭐ Score : <span id="score">0</span></div>
    <div class="card">❤️ Vies : <span id="lives">3</span></div>
</div>

<canvas id="game" width="500" height="700"></canvas>

<p style="margin-top:10px">
⌨️ Contrôles : ZQSD
</p>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const lanes = [90,190,290,390];

let playerLane = 1;

let distance = 0;
let score = 0;
let lives = 3;
let roadOffset = 0;

const keys = {};
const enemies = [];
const coins = [];

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

function spawnEnemy(){

    enemies.push({
        lane:Math.floor(Math.random()*4),
        y:-120,
        speed:5+Math.random()*3
    });
}

function spawnCoin(){

    coins.push({
        lane:Math.floor(Math.random()*4),
        y:-50,
        speed:5
    });
}

setInterval(spawnEnemy,900);
setInterval(spawnCoin,1800);

function update(){

    if(keys["q"]){
        playerLane--;
        keys["q"] = false;
    }

    if(keys["d"]){
        playerLane++;
        keys["d"] = false;
    }

    playerLane =
        Math.max(0,
        Math.min(3,playerLane));

    distance += 0.15;
    score += 1;

    document.getElementById("distance")
        .textContent =
        Math.floor(distance);

    document.getElementById("score")
        .textContent =
        score;

    document.getElementById("lives")
        .textContent =
        lives;

    roadOffset += 8;

    enemies.forEach(enemy=>{

        enemy.y += enemy.speed;

        if(
            enemy.lane === playerLane &&
            enemy.y > 520 &&
            enemy.y < 650
        ){
            lives--;

            enemy.y = 900;

            if(lives <= 0){

                alert(
                    "💥 Game Over\nScore : "
                    + score
                );

                location.reload();
            }
        }
    });

    coins.forEach(coin=>{

        coin.y += coin.speed;

        if(
            coin.lane === playerLane &&
            coin.y > 540 &&
            coin.y < 650
        ){
            score += 100;
            coin.y = 900;
        }
    });

    if(distance >= 220){

        alert(
            "🎉 Bravo ! Tu es arrivé à Lille !\nScore : "
            + score
        );

        location.reload();
    }
}

function drawRoad(){

    ctx.fillStyle="#3cb043";
    ctx.fillRect(0,0,50,700);
    ctx.fillRect(450,0,50,700);

    ctx.fillStyle="#555";
    ctx.fillRect(50,0,400,700);

    ctx.strokeStyle="white";
    ctx.lineWidth=5;

    for(let y=-40;y<700;y+=40){

        let pos = y + (roadOffset % 40);

        ctx.beginPath();
        ctx.moveTo(150,pos);
        ctx.lineTo(150,pos+20);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(250,pos);
        ctx.lineTo(250,pos+20);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(350,pos);
        ctx.lineTo(350,pos+20);
        ctx.stroke();
    }
}

function drawPlayer(){

    const x = lanes[playerLane];

    ctx.fillStyle="#d60000";

    ctx.fillRect(x,560,60,110);

    ctx.fillStyle="#87ceeb";

    ctx.fillRect(x+10,580,40,25);

    ctx.fillStyle="black";

    ctx.fillRect(x+5,570,10,20);
    ctx.fillRect(x+45,570,10,20);

    ctx.fillRect(x+5,640,10,20);
    ctx.fillRect(x+45,640,10,20);
}

function drawEnemies(){

    enemies.forEach(enemy=>{

        const x = lanes[enemy.lane];

        ctx.fillStyle="#0057ff";

        ctx.fillRect(x,enemy.y,60,110);

        ctx.fillStyle="#87ceeb";

        ctx.fillRect(
            x+10,
            enemy.y+20,
            40,
            25
        );
    });
}

function drawCoins(){

    coins.forEach(coin=>{

        const x = lanes[coin.lane] + 20;

        ctx.beginPath();
        ctx.fillStyle="gold";

        ctx.arc(
            x,
            coin.y,
            15,
            0,
            Math.PI*2
        );

        ctx.fill();
    });
}

function drawSigns(){

    if(distance < 20){
        panel("Paris");
    }
    else if(distance < 120){
        panel("Arras");
    }
    else{
        panel("Lille");
    }
}

function panel(text){

    ctx.fillStyle="white";
    ctx.fillRect(330,70,120,50);

    ctx.strokeStyle="black";
    ctx.strokeRect(330,70,120,50);

    ctx.fillStyle="black";
    ctx.font="20px Arial";

    ctx.fillText(text,350,102);
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawRoad();
    drawCoins();
    drawEnemies();
    drawSigns();
    drawPlayer();
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
